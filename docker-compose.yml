services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: portfolio-backend:latest
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: "5000"
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - portfolio-net
    deploy:
      replicas: 1 # do not scale without Redis-backed cache/rate-limit — see docs/ARCHITECTURE.md

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    image: portfolio-frontend:latest
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    networks:
      - portfolio-net

networks:
  portfolio-net:
    driver: bridge
