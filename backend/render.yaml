services:
  - type: web
    name: portfolio-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    region: oregon
    healthCheckPath: /health
    autoDeployTrigger: commit
    numInstances: 1 # do not scale — see docs/architecture.md (in-memory cache/rate-limit)

    envVars:
      - key: NODE_ENV
        value: production

      - key: MONGO_URI
        sync: false

      - key: JWT_SECRET
        sync: false
        generateValue: false

      - key: ALLOWED_ORIGIN
        sync: false
        # Must exactly match the deployed Vercel production domain,
        # e.g. https://your-portfolio.vercel.app (no trailing slash)

      - key: CLOUD_NAME
        sync: false

      - key: CLOUD_API_KEY
        sync: false

      - key: CLOUD_API_SECRET
        sync: false

      - key: LOG_LEVEL
        value: info
