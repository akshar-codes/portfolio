<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->
    <title>Akshar Gupta | Full Stack Developer</title>
    <meta
      name="description"
      content="Akshar Gupta — B.Tech CSE student and Full Stack MERN developer. Building scalable web applications with React, Node.js, Express, and MongoDB."
    />
    <meta name="author" content="Akshar Gupta" />
    <meta
      name="keywords"
      content="Akshar Gupta, Full Stack Developer, MERN Stack, React, Node.js, Express, MongoDB, Web Developer India"
    />

    <!-- Canonical -->
    <link rel="canonical" href="https://akshar-gupta.vercel.app/" />

    <!-- Google Fonts — Inter + JetBrains Mono (foundation pages) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/images/logo.ico" />
    <link rel="icon" type="image/svg+xml" href="/images/logo.svg" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://akshar-gupta.vercel.app/" />
    <meta property="og:title" content="Akshar Gupta | Full Stack Developer" />
    <meta
      property="og:description"
      content="B.Tech CSE student and Full Stack MERN developer. Building scalable web applications with React, Node.js, Express, and MongoDB."
    />
    <meta
      property="og:image"
      content="https://akshar-gupta.vercel.app/images/og-preview.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Akshar Gupta — Full Stack Developer portfolio preview"
    />
    <meta property="og:site_name" content="Akshar Gupta Portfolio" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://akshar-gupta.vercel.app/" />
    <meta name="twitter:title" content="Akshar Gupta | Full Stack Developer" />
    <meta
      name="twitter:description"
      content="B.Tech CSE student and Full Stack MERN developer. Building scalable web applications with React, Node.js, Express, and MongoDB."
    />
    <meta
      name="twitter:image"
      content="https://akshar-gupta.vercel.app/images/og-preview.png"
    />
    <meta
      name="twitter:image:alt"
      content="Akshar Gupta — Full Stack Developer portfolio preview"
    />

    <!--
      Ionicons custom-element runtime.
      Portfolio.jsx renders <ion-icon name="eye-outline" /> as the hover
      overlay on project cards — without this script that custom element
      has no definition and silently renders nothing.
    -->
    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
