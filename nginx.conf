worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 65;

    # Don't leak nginx version in headers/error pages
    server_tokens off;

    # ------------------------------------------------------------
    # Gzip — API JSON and static build assets both benefit
    # ------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ------------------------------------------------------------
    # Edge rate limiting — defense in depth alongside the
    # backend's express-rate-limit. Keyed by client IP as seen by
    # nginx itself (the first hop), so this layer is unaffected by
    # the backend's `trust proxy` configuration.
    # ------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api_login:10m rate=5r/m;
    limit_req_status 429;

    # Real client IP forwarding to the backend
    map $remote_addr $forwarded_for {
        default $remote_addr;
    }

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        client_max_body_size 6m; # slightly above the 5MB multer limit for multipart overhead

        # ------------------------------------------------------------
        # Baseline security headers (defense in depth — the API also
        # sets its own via Helmet on JSON responses)
        # ------------------------------------------------------------
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ------------------------------------------------------------
        # Fingerprinted Vite build assets — safe to cache forever
        # ------------------------------------------------------------
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Never cache the HTML shell — it references the current
        # fingerprinted asset bundle and must always be revalidated
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # ------------------------------------------------------------
        # Tighter limit specifically on the login endpoint, on top of
        # the backend's own 5-attempts/15-min loginLimiter
        # ------------------------------------------------------------
        location = /api/admin/login {
            limit_req zone=api_login burst=3 nodelay;

            proxy_pass http://backend:5000/api/admin/login;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cookie_path / /;
        }

        # ------------------------------------------------------------
        # General API reverse proxy
        # ------------------------------------------------------------
        location /api/ {
            limit_req zone=api_general burst=20 nodelay;

            proxy_pass http://backend:5000/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cookie_path / /;
        }

        # ------------------------------------------------------------
        # Health check — excluded from rate limiting so orchestrator
        # polling never gets throttled
        # ------------------------------------------------------------
        location = /health {
            proxy_pass http://backend:5000/health;
            proxy_set_header Host $host;
            access_log off;
        }

        # ------------------------------------------------------------
        # SPA fallback — React Router owns all other client-side routes
        # ------------------------------------------------------------
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}